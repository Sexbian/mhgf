            font-size: 1.4rem; animation: blink 0.8s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .body-alert-mode { background-color: #1a0000 !important; }
        
        #access-denied { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; justify-content: center; align-items: center; flex-direction: column; z-index: 9999; }

            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function startSiren() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            setInterval(() => {
                osc.frequency.exponentialRampToValueAtTime(250, audioCtx.currentTime + 0.5);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 1);

        let index = 0, isWaiting = false, alertMode = false;
        const buffer = document.getElementById('text-buffer'), contentDiv = document.getElementById('content'), spacePrompt = document.getElementById('press-space');

        function typeWriter() {
            if (index < trescWywiadu.length && !isWaiting) {
                if (trescWywiadu.substring(index, index + 11) === "(red-alert)") {
                    alertMode = true; index += 11; buffer.innerHTML = '';
                    document.body.classList.add('body-alert-mode');
                    startSiren();
                    setTimeout(typeWriter, 100); return;
                }
                if (trescWywiadu.substring(index, index + 6) === "[WAIT]") {
                    isWaiting = true; spacePrompt.style.display = "block"; index += 6; return;
                }

                if (trescWywiadu[index] !== " " && trescWywiadu[index] !== "\n") playSound(Math.random() * 20 + 120, 'sine', 0.05, 0.02);

                let current = trescWywiadu.substring(alertMode ? index - (index - trescWywiadu.indexOf("(red-alert)") - 11) : 0, index + 1);
                
                buffer.innerHTML = current
                    .replace(/\(meta\)/g, '<div class="meta-data">').replace(/---\n/g, '</div>')
                    .replace(/\(srodek\)(.*?)\n/g, '<span class="center-text">$1</span>')
                    .replace(/\(alarm\)(.*?)\n/g, '<div class="critical-box">$1</div>')
                    .replace(/\(koniec\)(.*?)$/g, '<span class="final-log-text">$1</span>')
                    .replace(/\*\*(.*?)\*\*/g, '<span class="bold">$1</span>').replace(/\*(.*?)\*/g, '<span class="italic">$1</span>')
                    .replace(/\n/g, '<br>').replace(/\[WAIT\]/g, '');
                
                index++;
                contentDiv.scrollTop = contentDiv.scrollHeight;
                setTimeout(typeWriter, alertMode ? 8 : 20);
            }
        }

        function checkPassword() {
            if (document.getElementById('password-input').value.toLowerCase() === "valentin") {
                document.getElementById('login-screen').style.display = "none";
                contentDiv.style.display = "block";
                typeWriter();
            } else { triggerSecurity(); }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === "Space" && isWaiting) {
                e.preventDefault(); isWaiting = false; spacePrompt.style.display = "none";
                playSound(300, 'square', 0.1, 0.1); 
                typeWriter();
            }
        });

        function triggerSecurity() {
            document.getElementById('login-screen').style.display = "none";
