<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL O5-COUNCIL | SCP-SL-014</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #login-screen {
            text-align: center;
            border: 2px solid #333;
            padding: 50px;
            background: rgba(5, 10, 5, 0.95);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
            max-width: 650px;
            z-index: 5;
        }

        .header-main { font-size: 2.5rem; font-weight: bold; margin: 0; letter-spacing: 4px; color: #fff; text-shadow: 0 0 10px #ff0000; }
        .header-sub { font-size: 1.1rem; margin: 10px 0 30px 0; color: #888; letter-spacing: 2px; }
        .warning-text { color: #ff0000; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; text-transform: uppercase; }
        .amnesty-note { color: #555; font-size: 0.75rem; margin-bottom: 25px; font-style: italic; line-height: 1.4; }

        input {
            background: #000; border: 1px solid #444; color: #00ff00; padding: 12px;
            font-family: inherit; outline: none; text-align: center; margin-bottom: 20px;
            display: block; width: 100%; box-sizing: border-box; font-size: 1.2rem;
        }

        button {
            background: #222; color: #00ff00; border: 1px solid #00ff00; padding: 10px 30px;
            cursor: pointer; font-weight: bold; text-transform: uppercase;
        }
        button:hover { background: #00ff00; color: #000; }

        /* KONTENER WYWIADU */
        #content {
            display: none;
            width: 90%;
            max-width: 1000px;
            height: 90vh;
            overflow-y: auto;
            border: 1px solid #00ff00;
            padding: 50px;
            background: #020202;
            box-shadow: inset 0 0 100px #000;
        }

        .meta-data { color: #008800; border-bottom: 1px solid #004400; padding-bottom: 20px; margin-bottom: 30px; font-size: 0.9rem; }
        .center-text { text-align: center; display: block; margin: 20px 0; width: 100%; }
        .bold { font-weight: bold; color: #ffffff; text-shadow: 0 0 5px rgba(255,255,255,0.3); }
        .italic { font-style: italic; color: #00ccff; }
        .line-break { margin-bottom: 1.2em; display: block; }
        
        /* Stylistyka logów systemowych */
        .system-alert { color: #ff0000; font-weight: bold; border: 1px solid #ff0000; padding: 10px; margin: 15px 0; background: rgba(255,0,0,0.1); }
        .system-log { color: #ffff00; font-weight: bold; margin: 10px 0; }

        /* EKRAN BLOKADY */
        #access-denied {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            justify-content: center; align-items: center; flex-direction: column; z-index: 9999; text-align: center;
        }
        #access-denied h1 { font-size: 6rem; margin: 0; font-weight: 900; }
        .strobe-A { background-color: #fff !important; color: #000 !important; }
        .strobe-B { background-color: #000 !important; color: #fff !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 class="header-main">ARCHIWUM RADY O5</h1>
        <div class="header-sub">PODSEKCJA SCP-SL-014, DODATEK 014-1</div>
        <hr style="border: 0; border-top: 1px solid #333; margin-bottom: 30px;">
        <p class="warning-text">WYMAGANA AUTORYZACJA O1-Os02/14</p>
        <p class="amnesty-note">Jeżeli znalazłeś się tu przypadkiem, natychmiastowo opuść stronę, sformatuj urządzenie oraz zażyj środki amnestyczne klasy A.</p>
        <input type="password" id="password-input" autocomplete="off" placeholder="KLUCZ BINARNY">
        <button onclick="checkPassword()">Weryfikuj</button>
    </div>

    <div id="content"></div>

    <div id="access-denied">
        <h1>DOSTĘP ODRZUCONY</h1>
        <p style="font-size: 2rem; font-weight: bold;">AGENT MEMETYCZNY ZOSTAŁ ZASTOSOWANY</p>
    </div>

    <script>
        const trescWywiadu = `
(meta) **PRZEPROWADZAJĄCY WYWIAD:** Dr. Rose
**DATA I GODZINA:** 30.03.2026 23:53
**NADZORUJĄCY PERSONEL OCHRONY:** Tom P. , Arthur L.
---
(srodek) *Dr. Rose wraz z Personelem Ochrony jest w pomieszczeniu przesłuchaniowym rozdzielonym grubą ścianą, SCP-SL-014 siedzi po jednej stronie natomiast Dr.Rose siada po drugiej nie patrząc się podmiotowi w oczy. Po chwili przygotowania odpala mikrofon*

**Dr.Rose:** Witaj, miło mi cię poznać. Jeżeli mogę wiedzieć jak się nazywasz?
**SCP-SL-014:** Witaj, nazywają mnie Valentin.

**Dr.Rose:** A więc jeszcze raz witaj Valentinie, jak cię już poinformowali przeprowadzę z tobą wywiad, a więc zaczynając. Skąd pochodzisz?
**SCP-SL-014:** Francja. Dawna Francja, ta zanim ludzie zaczęli udawać, że rozumieją porządek świata.

**Dr.Rose:** Czy możesz to doprecyzować?
**SCP-SL-014:** Paryż. Ale nie ten, który znacie z pocztówek. Ten, który palił się w imię „rewolucji”.

**Dr.Rose:** Rewolucji francuskiej?
**SCP-SL-014:** Tak ją nazywacie. Ja nazywam to polowaniem. Na mój… gatunek.

**Dr.Rose:** Twierdzisz, że byłeś tam obecny?
**SCP-SL-014:** Oczywiście. Przeżyłem ją. Większość nie miała tyle szczęścia.

**Dr.Rose:** Ile masz lat?
**SCP-SL-014:** Przestałem to liczyć dawno temu, jednakże wydaje mi się że urodziłem się około sto lat przed powstaniem waszego kraju.

**Dr.Rose:** W takim razie jak trafiłeś do Stanów Zjednoczonych?
**SCP-SL-014:** Statkiem. Wtedy jeszcze nikt nie zadawał pytań, jeśli płaciło się złotem i nie umierało na pokładzie.

**Dr.Rose:** Dlaczego zdecydowałeś się pozostać w Nowym Jorku?
**SCP-SL-014:** Bo było… wygodne. Dużo ludzi. Mało pytań. Idealne warunki.

**Dr.Rose:** Przechodząc do momentu twojego zabezpieczenia, dlaczego zgodziłeś się na dobrowolne przetrzymywanie przez Fundację?
**SCP-SL-014:** Bo byłem zmęczony. I głodny. A wasze propozycje były… rozsądne. Stały dostęp do pożywienia i brak nagonki. W zamian za klatkę.

**Dr.Rose:** Nie przeszkadza ci to?
**SCP-SL-014:** Klatki różnią się tylko jakością. Ta przynajmniej jest przewidywalna.

**Dr.Rose:** Czy możesz opisać swoje pochodzenie dokładniej? Kim jesteś?
**SCP-SL-014:** Jestem tym, co wasze mity i legendy określają jako Wampir, jednakże muszę wam przyznać iż potraficie ciekawie podkoloryzować pewne rzeczy.

**Dr.Rose:** Jakie rzeczy podkoloryzowaliśmy?
**SCP-SL-014:** *Valentin się podśmiechuje* Czosnek, krzyże, woda święcona albo moje ulubione, to że powstajemy przez zwykłe ugryzienie w człowieka w szyje. Nie wiem skąd to wzieliście ale jak o tym usłyszałem to mnie to bardzo rozbawiło. 

**Dr.Rose:** To w takim razie jak powstajecie, rodzicie się tacy?
**SCP-SL-014:** Oczywiście że nie, każdy z nas rodzi się człowiekiem. Żeby człowiek stał się jednym z nas inny wampir musi wyssać z niego całą krew a następnie wlać mu do ust część swojej krwi. 

**Dr.Rose:** To kto w takim razie cię stworzył?
**SCP-SL-014:** *Valentin poważnieje i zachowuje ciszę*

**Dr.Rose:** Valentin?
**SCP-SL-014:** Nie odpowiem na to.

**Dr.Rose:** Dlaczego?
**SCP-SL-014:** Nie miło jest mówić o kimś, kto nas słyszy.

**Dr.Rose:** *Wyraz twarzy Dr.Rose pokazuje lekki strach* …Rozumiem.

**Dr.Rose:** Jak oceniasz swoją obecną sytuację?
**SCP-SL-014:** Wygodna. Ciekawa nawet. Wasi ludzie… udają, że mnie rozumieją.

**Dr.Rose:** Czy stanowisz zagrożenie dla Fundacji?
**SCP-SL-014:** Gdybym chciał, nie zadawałbyś mi tego pytania. ... Logo tej waszej fundacji wydają mi się znajome, i to bardzo.

**Dr.Rose:** Kojarzysz te loga? Skąd?
**SCP-SL-014:** Stworzył je mój stary znajomy... nazywał się James Aaron Siegel. Również był wampirem.

(alarm) [PRZERWA W NAGRANIU — 00:00:14]
(log) [DODATEK LOGU SYSTEMOWEGO: AUTOMATYCZNE WYSZUKIWANIE TERMINU „JAMES AARON SIEGEL” ZAINICJOWANE PRZEZ DR.ROSE]
(alarm) [ALARM BEZPIECZEŃSTWA — POZIOM 3]
(alert) [DOSTĘP DO ZABEZPIECZONYCH DANYCH ZABLOKOWANY]
(log) [OGŁOSZENIE AUTOMATYCZNE: CAŁY PERSONEL POZOSTAĆ NA STANOWISKACH]
(log) [PRZYBYCIE: MFO ALFA-1]
(alert) [STATUS: PROTOKÓŁ AMNESTYCZNY WDROŻONY WOBEC PERSONELU BIORĄCEGO UDZIAŁ W WYWIADZIE]

(srodek) **KONIEC WYWIADU**
        `;

        function parseText(text) {
            return text.trim()
                .replace(/\(meta\)/g, '<div class="meta-data">')
                .replace(/---\n/g, '</div>')
                .replace(/\(srodek\)(.*?)\n/g, '<span class="center-text">$1</span>')
                .replace(/\(alarm\)(.*?)\n/g, '<div class="system-log" style="color: #ffaa00;">$1</div>')
                .replace(/\(log\)(.*?)\n/g, '<div class="system-log">$1</div>')
                .replace(/\(alert\)(.*?)\n/g, '<div class="system-alert">$1</div>')
                .replace(/\*\*(.*?)\*\*/g, '<span class="bold">$1</span>')
                .replace(/\*(.*?)\*/g, '<span class="italic">$1</span>')
                .replace(/\n/g, '<span class="line-break"></span>');
        }

        function checkPassword() {
            const pass = document.getElementById('password-input').value;
            if (pass.toLowerCase() === "valentin") {
                document.getElementById('login-screen').style.display = "none";
                const contentDiv = document.getElementById('content');
                contentDiv.style.display = "block";
                contentDiv.innerHTML = parseText(trescWywiadu);
            } else {
                triggerSecurityProtocol();
            }
        }

        function triggerSecurityProtocol() {
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('access-denied').style.display = "flex";
            let state = false;
            setInterval(() => {
                document.body.className = state ? "strobe-A" : "strobe-B";
                state = !state;
            }, 100); 

            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'square'; 
                oscillator.frequency.setValueAtTime(10000, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                setInterval(() => {
                    oscillator.frequency.exponentialRampToValueAtTime(state ? 10000 : 12000, audioCtx.currentTime + 0.05);
                }, 100);
            } catch(e) {}
        }
    </script>
</body>
</html>
